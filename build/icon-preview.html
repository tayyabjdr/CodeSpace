<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CodeSpace · Icon Preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Geist Variable", "Segoe UI Variable", -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0b0d;
    color: rgba(255, 255, 255, 0.92);
    padding: 48px 40px 80px;
    -webkit-font-smoothing: antialiased;
  }
  header { margin-bottom: 36px; max-width: 720px; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 8px; }
  header p { font-size: 13px; color: rgba(255, 255, 255, 0.42); line-height: 1.55; }

  section { margin-bottom: 32px; }
  section h2 {
    font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 1px solid #1b1e24;
  }

  .row { display: flex; align-items: flex-end; gap: 28px; flex-wrap: wrap; }
  .cell { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .cell img {
    display: block;
    background: #0d0f12;
    border: 1px solid #1b1e24;
    border-radius: 6px;
  }
  .cell img.bare { background: transparent; border: none; border-radius: 0; }
  .cell .label {
    font-family: "Geist Mono Variable", ui-monospace, "Cascadia Code", "Consolas", monospace;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.42);
    letter-spacing: 0.04em;
  }

  .light-row { background: #f5f5f7; padding: 24px; border-radius: 10px; display: flex; gap: 28px; align-items: flex-end; flex-wrap: wrap; }
  .light-row .label { color: rgba(0, 0, 0, 0.45); }
</style>
</head>
<body>

<header>
  <h1>App icon · slightly-blue gradient + cyan accent</h1>
  <p>Preview at the rendered sizes Windows uses for taskbar (16/24/32), desktop shortcut (48), and Start menu / installer (256).</p>
</header>

<section>
  <h2>On dark surface</h2>
  <div class="row">
    <div class="cell"><img src="icon.svg" width="16"  height="16"  alt=""><span class="label">16</span></div>
    <div class="cell"><img src="icon.svg" width="24"  height="24"  alt=""><span class="label">24</span></div>
    <div class="cell"><img src="icon.svg" width="32"  height="32"  alt=""><span class="label">32</span></div>
    <div class="cell"><img src="icon.svg" width="48"  height="48"  alt=""><span class="label">48</span></div>
    <div class="cell"><img src="icon.svg" width="64"  height="64"  alt=""><span class="label">64</span></div>
    <div class="cell"><img src="icon.svg" width="128" height="128" alt=""><span class="label">128</span></div>
    <div class="cell"><img src="icon.svg" width="256" height="256" alt=""><span class="label">256</span></div>
  </div>
</section>

<section>
  <h2>On light surface (light-mode taskbar)</h2>
  <div class="light-row">
    <div class="cell"><img class="bare" src="icon.svg" width="16"  height="16"  alt=""><span class="label">16</span></div>
    <div class="cell"><img class="bare" src="icon.svg" width="24"  height="24"  alt=""><span class="label">24</span></div>
    <div class="cell"><img class="bare" src="icon.svg" width="32"  height="32"  alt=""><span class="label">32</span></div>
    <div class="cell"><img class="bare" src="icon.svg" width="48"  height="48"  alt=""><span class="label">48</span></div>
    <div class="cell"><img class="bare" src="icon.svg" width="64"  height="64"  alt=""><span class="label">64</span></div>
    <div class="cell"><img class="bare" src="icon.svg" width="128" height="128" alt=""><span class="label">128</span></div>
  </div>
</section>

</body>
</html>
